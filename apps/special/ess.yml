apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-store
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-99"
spec:
  project: default
  source:
    repoURL: 'https://github.com/Tapeline/exp-homelab-gitops.git'
    targetRevision: master
    path: config/special/ess
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
    retry:
      limit: 5
