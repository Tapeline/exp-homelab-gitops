apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: termix
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: termix
  source:
    repoURL: 'https://github.com/Tapeline/exp-homelab-gitops.git'
    path: config/services/termix
    targetRevision: master
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
