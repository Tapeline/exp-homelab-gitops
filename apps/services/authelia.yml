apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authelia
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: authelia
  sources:
    - repoURL: 'https://charts.authelia.com'
      chart: authelia
      targetRevision: 0.11.6
      helm:
        valueFiles:
          - $values/config/services/authelia/values.yml
    - repoURL: 'https://github.com/Tapeline/exp-homelab-gitops.git'
      targetRevision: master
      ref: values
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
