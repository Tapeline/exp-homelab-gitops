apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: termix-secrets
  namespace: termix
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: termix-secrets
    creationPolicy: Owner
  data:
    - secretKey: client_secret
      remoteRef:
        key: kv-main/oidc/termix
        property: secret
